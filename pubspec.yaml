name: zero_type
description: "ZeroType - AI-powered voice transcription & refinement tool"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # DI
  get_it: ^9.2.1

  # Navigation
  auto_route: ^11.1.0

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0


  # Recording
  record: ^6.2.0

  # Global hotkey
  hotkey_manager: ^0.2.3

  # System tray
  tray_manager: ^0.5.2

  # Launch at startup
  launch_at_startup: ^0.5.1

  # HTTP
  dio: ^5.8.0+1

  # File paths
  path: ^1.9.1
  path_provider: ^2.1.5

  # Window management (for overlay window)
  window_manager: ^0.5.1

  # Local data persistence (non-secure, for settings)
  shared_preferences: ^2.3.5
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.2.3
  json_serializable: ^6.9.2
  auto_route_generator: ^10.4.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/config/providers.json
    - assets/icons/
    - prompts/
